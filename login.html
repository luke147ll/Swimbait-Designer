<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Swimbait Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0d;--sf:#181816;--sf2:#222220;--bd:#2e2e2a;--tx:#e8e4d9;--mu:#8a8778;--ac:#c4a04a;--ac2:#5a9a6b;--err:#c45a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:6px;width:100%;max-width:400px;overflow:hidden}
.card-header{padding:24px 28px 16px;text-align:center;border-bottom:1px solid var(--bd)}
.card-header h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:24px;margin-bottom:2px}
.card-header .sub{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:2px}

.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:12px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--mu);cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom:2px solid var(--ac);background:var(--sf2)}

.form-body{padding:24px 28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field-hint{font-size:8px;color:var(--mu);margin-top:4px;opacity:.6}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:10px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .15s}
.input-wrap input:focus{border-color:var(--ac)}
.input-wrap input.err{border-color:var(--err)}
.pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;padding:4px}
.pw-toggle:hover{color:var(--tx)}

.username-status{font-size:8px;margin-top:4px;height:12px}
.username-status.available{color:var(--ac2)}
.username-status.taken{color:var(--err)}

.submit-btn{width:100%;padding:12px;background:var(--ac);color:var(--bg);border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:2px;border-radius:3px;transition:opacity .15s;margin-top:8px}
.submit-btn:hover:not(:disabled){opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:default}

.error-msg{font-size:10px;color:var(--err);text-align:center;margin-top:12px;min-height:16px}

.footer-link{text-align:center;padding:16px 28px;border-top:1px solid var(--bd);font-size:9px;color:var(--mu)}
.footer-link a{color:var(--ac);text-decoration:none}
.footer-link a:hover{text-decoration:underline}

#signupForm{display:none}
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Swimbait Designer</h1>
    <div class="sub">Spline-based profile engine</div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tabLogin" onclick="showTab('login')">Sign in</button>
    <button class="tab" id="tabSignup" onclick="showTab('signup')">Create account</button>
  </div>

  <!-- Login form -->
  <form id="loginForm" class="form-body" onsubmit="submitLogin(event)">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap"><input type="text" id="loginUser" autocomplete="username" required></div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="loginPass" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" onclick="togglePw(this)">show</button>
      </div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">Sign in</button>
    <div class="error-msg" id="loginError"></div>
  </form>

  <!-- Signup form -->
  <form id="signupForm" class="form-body" onsubmit="submitSignup(event)">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap"><input type="text" id="signupUser" autocomplete="username" required></div>
      <div class="username-status" id="usernameStatus"></div>
      <div class="field-hint">3-20 characters, letters/numbers/underscores</div>
    </div>
    <div class="field">
      <label>Display name <span style="opacity:.4">(optional)</span></label>
      <div class="input-wrap"><input type="text" id="signupDisplay" autocomplete="name"></div>
    </div>
    <div class="field">
      <label>Email <span style="opacity:.4">(optional, for recovery)</span></label>
      <div class="input-wrap"><input type="email" id="signupEmail" autocomplete="email"></div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="signupPass" autocomplete="new-password" required>
        <button type="button" class="pw-toggle" onclick="togglePw(this)">show</button>
      </div>
      <div class="field-hint">8+ characters</div>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <div class="input-wrap"><input type="password" id="signupConfirm" autocomplete="new-password" required></div>
    </div>
    <button type="submit" class="submit-btn" id="signupBtn">Create account</button>
    <div class="error-msg" id="signupError"></div>
  </form>

  <div class="footer-link"><a href="/">Back to designer</a></div>
</div>

<script>
// ── Auth check: redirect if already logged in ──
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) window.location = '/profile';
  } catch {}
})();

// ── Tab switching ──
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('on', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('on', tab === 'signup');
}

// ── Password visibility toggle ──
function togglePw(btn) {
  const inp = btn.parentElement.querySelector('input');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? 'hide' : 'show';
}

// ── Username availability check (debounced) ──
let checkTimer = null;
document.getElementById('signupUser').addEventListener('input', e => {
  clearTimeout(checkTimer);
  const val = e.target.value.trim();
  const el = document.getElementById('usernameStatus');
  if (val.length < 3) { el.textContent = ''; el.className = 'username-status'; return; }
  checkTimer = setTimeout(async () => {
    try {
      const res = await fetch(`/api/auth/check-username?username=${encodeURIComponent(val)}`);
      const data = await res.json();
      if (data.available) {
        el.textContent = 'Available';
        el.className = 'username-status available';
      } else {
        el.textContent = data.error || 'Taken';
        el.className = 'username-status taken';
      }
    } catch {
      el.textContent = '';
    }
  }, 500);
});

// ── Login submit ──
async function submitLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('loginUser').value.trim(),
        password: document.getElementById('loginPass').value,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location = '/profile';
    } else {
      errEl.textContent = data.error || 'Login failed';
    }
  } catch {
    errEl.textContent = 'Network error — try again';
  }
  btn.disabled = false;
  btn.textContent = 'Sign in';
}

// ── Signup submit ──
async function submitSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signupBtn');
  const errEl = document.getElementById('signupError');
  errEl.textContent = '';

  const password = document.getElementById('signupPass').value;
  const confirm = document.getElementById('signupConfirm').value;
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('signupUser').value.trim(),
        password,
        email: document.getElementById('signupEmail').value.trim() || undefined,
        displayName: document.getElementById('signupDisplay').value.trim() || undefined,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location = '/profile';
    } else {
      errEl.textContent = data.error || 'Signup failed';
    }
  } catch {
    errEl.textContent = 'Network error — try again';
  }
  btn.disabled = false;
  btn.textContent = 'Create account';
}
</script>
</body>
</html>
