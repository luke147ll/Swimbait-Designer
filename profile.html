<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Designs — Swimbait Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0d;--sf:#181816;--sf2:#222220;--bd:#2e2e2a;--tx:#e8e4d9;--mu:#8a8778;--ac:#c4a04a;--ac2:#5a9a6b;--err:#c45a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh}

/* ── Nav ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--sf)}
.nav-brand{font-family:'Instrument Serif',serif;font-size:18px;text-decoration:none;color:var(--tx)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;
  font-size:9px;padding:6px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;
  border-radius:2px;text-decoration:none;transition:all .15s}
.nav-btn:hover{border-color:var(--ac);color:var(--tx)}
.nav-btn.primary{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.nav-btn.primary:hover{opacity:.85}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ac);cursor:pointer;position:relative}
.nav-avatar:hover{border-color:var(--ac)}
.avatar-menu{display:none;position:absolute;top:36px;right:0;background:var(--sf);border:1px solid var(--bd);
  border-radius:4px;min-width:120px;z-index:50;overflow:hidden}
.avatar-menu.open{display:block}
.avatar-menu a,.avatar-menu button{display:block;width:100%;text-align:left;padding:8px 14px;font-size:9px;
  color:var(--mu);text-decoration:none;border:none;background:none;font-family:'DM Mono',monospace;
  text-transform:uppercase;letter-spacing:1px;cursor:pointer}
.avatar-menu a:hover,.avatar-menu button:hover{background:var(--sf2);color:var(--tx)}

/* ── Profile header ── */
.profile-header{padding:28px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:20px;max-width:1100px;margin:0 auto}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--sf2);border:2px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ac);font-family:'Instrument Serif',serif;flex-shrink:0}
.profile-info h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:20px}
.profile-meta{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

/* ── Stats row ── */
.stats-row{display:flex;gap:24px;padding:16px 24px;border-bottom:1px solid var(--bd);max-width:1100px;margin:0 auto}
.stat-item{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.stat-item strong{color:var(--tx);font-size:12px;margin-right:3px}

/* ── Toolbar: tabs + search + sort ── */
.toolbar{display:flex;align-items:center;gap:12px;padding:14px 24px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
.filter-tabs{display:flex;gap:2px}
.ftab{background:none;border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;
  font-size:8px;padding:5px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .12s}
.ftab:first-child{border-radius:3px 0 0 3px}.ftab:last-child{border-radius:0 3px 3px 0}
.ftab:hover{border-color:var(--ac);color:var(--tx)}
.ftab.on{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.search-box{flex:1;min-width:120px;max-width:260px;padding:6px 10px;background:var(--sf2);border:1px solid var(--bd);
  border-radius:3px;color:var(--tx);font-family:'DM Mono',monospace;font-size:10px;outline:none}
.search-box:focus{border-color:var(--ac)}
.search-box::placeholder{color:var(--mu);opacity:.5}
.sort-btn{background:none;border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;
  font-size:8px;padding:5px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-radius:3px}
.sort-btn:hover{border-color:var(--ac);color:var(--tx)}

/* ── Design grid ── */
.grid-wrap{max-width:1100px;margin:0 auto;padding:16px 24px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:14px}

.design-card{background:var(--sf);border:1px solid var(--bd);border-radius:4px;overflow:hidden;transition:border-color .15s;position:relative}
.design-card:hover{border-color:var(--ac)}
.card-thumb{width:100%;aspect-ratio:16/10;background:var(--sf2);display:flex;align-items:center;justify-content:center;
  color:var(--mu);font-size:9px;text-transform:uppercase;letter-spacing:1px;overflow:hidden;cursor:pointer}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-badge{position:absolute;top:8px;right:8px;font-size:7px;padding:2px 6px;border-radius:2px;
  text-transform:uppercase;letter-spacing:1px;background:var(--ac2);color:var(--bg)}
.card-body{padding:10px 12px}
.card-name{font-size:11px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.card-name:hover{color:var(--ac)}
.card-meta{font-size:8px;color:var(--mu);display:flex;gap:6px;flex-wrap:wrap}
.card-actions{display:flex;gap:4px;margin-top:8px}
.card-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;
  font-size:8px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-radius:2px;transition:all .12s}
.card-btn:hover{border-color:var(--ac);color:var(--tx)}
.card-btn.danger:hover{border-color:var(--err);color:var(--err)}

/* New design card */
.new-card{border-style:dashed;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px}
.new-card:hover{border-color:var(--ac)}
.new-card .plus{font-size:28px;color:var(--ac);margin-bottom:6px}
.new-card .label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px}

.empty-state{text-align:center;padding:50px 20px;color:var(--mu);font-size:10px}
.loading{text-align:center;padding:40px;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px}

/* ── Toast notification ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf);
  border:1px solid var(--ac);border-radius:4px;padding:10px 18px;font-size:10px;color:var(--tx);
  z-index:200;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast a{color:var(--ac);margin-left:6px;cursor:pointer;text-decoration:underline}

/* ── Confirm dialog ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.overlay.active{display:flex}
.dialog{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:24px;max-width:360px;width:90%;text-align:center}
.dialog p{font-size:11px;margin-bottom:16px;line-height:1.6}
.dialog-btns{display:flex;gap:8px;justify-content:center}
.dialog-btn{padding:8px 16px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);font-family:'DM Mono',monospace;
  font-size:9px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-radius:2px}
.dialog-btn:hover{border-color:var(--ac);color:var(--tx)}
.dialog-btn.danger{background:var(--err);color:var(--bg);border-color:var(--err)}
.dialog-btn.danger:hover{opacity:.85}

@media(max-width:600px){
  .profile-header{flex-direction:column;text-align:center;padding:20px 16px}
  .stats-row{flex-wrap:wrap;gap:12px;padding:12px 16px}
  .toolbar{padding:10px 16px}
  .grid-wrap{padding:12px 16px 32px}
  .grid{grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:10px}
  .nav{padding:12px 16px}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">Swimbait Designer</a>
  <div class="nav-right">
    <a href="/" class="nav-btn primary">New design</a>
    <div class="nav-avatar" id="navAvatar" onclick="toggleAvatarMenu()">
      <span id="navMonogram"></span>
      <div class="avatar-menu" id="avatarMenu">
        <a href="/profile">My designs</a>
        <button onclick="logout()">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<div class="profile-header" id="profileHeader" style="display:none">
  <div class="profile-avatar" id="avatar"></div>
  <div>
    <h2 id="displayName"></h2>
    <div class="profile-meta"><span id="username"></span> &middot; <span id="plan"></span> &middot; joined <span id="joined"></span></div>
  </div>
</div>

<div class="stats-row" id="statsRow" style="display:none">
  <div class="stat-item"><strong id="statDesigns">0</strong> designs</div>
  <div class="stat-item"><strong id="statExports">0</strong> exports</div>
  <div class="stat-item"><strong id="statShared">0</strong> shared</div>
  <div class="stat-item"><strong id="statPlan">free</strong> plan</div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="filter-tabs">
    <button class="ftab on" data-filter="all" onclick="setFilter(this)">My designs</button>
    <button class="ftab" data-filter="shared" onclick="setFilter(this)">Shared</button>
    <button class="ftab" data-filter="exported" onclick="setFilter(this)">Exported</button>
  </div>
  <input type="text" class="search-box" id="searchBox" placeholder="Search designs..." oninput="applyFilters()">
  <button class="sort-btn" id="sortBtn" onclick="toggleSort()">Recent</button>
</div>

<div class="grid-wrap">
  <div class="loading" id="loadingState">Loading designs...</div>
  <div class="grid" id="designGrid" style="display:none"></div>
</div>

<div class="overlay" id="deleteOverlay">
  <div class="dialog">
    <p id="deleteMsg">Delete this design? This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="dialog-btn" onclick="closeDeleteDialog()">Cancel</button>
      <button class="dialog-btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let allDesigns = [];
let activeFilter = 'all';
let sortMode = 'recent'; // 'recent' | 'name'
let pendingDeleteId = null;

// ── Auth ──
async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location = '/login'; return null; }
    return await res.json();
  } catch { window.location = '/login'; return null; }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location = '/login';
}

function toggleAvatarMenu() {
  document.getElementById('avatarMenu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.nav-avatar')) document.getElementById('avatarMenu').classList.remove('open');
});

// ── Profile rendering ──
function renderProfile(user) {
  currentUser = user;
  const mono = (user.displayName || user.username).slice(0, 2).toUpperCase();
  document.getElementById('navMonogram').textContent = mono;
  document.getElementById('avatar').textContent = mono;
  document.getElementById('displayName').textContent = user.displayName || user.username;
  document.getElementById('username').textContent = '@' + user.username;
  document.getElementById('plan').textContent = user.plan || 'free';
  document.getElementById('joined').textContent = new Date(user.createdAt).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  document.getElementById('statPlan').textContent = user.plan || 'free';
  document.getElementById('profileHeader').style.display = 'flex';
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('toolbar').style.display = 'flex';
}

// ── Design rendering ──
function renderDesigns() {
  const grid = document.getElementById('designGrid');
  document.getElementById('loadingState').style.display = 'none';
  grid.style.display = 'grid';

  // Stats
  document.getElementById('statDesigns').textContent = allDesigns.length;
  document.getElementById('statExports').textContent = allDesigns.reduce((s, d) => s + (d.exportCount || 0), 0);
  document.getElementById('statShared').textContent = allDesigns.filter(d => d.public).length;

  // Filter
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  let filtered = allDesigns;
  if (activeFilter === 'shared') filtered = filtered.filter(d => d.public);
  else if (activeFilter === 'exported') filtered = filtered.filter(d => d.exportCount > 0);
  if (search) filtered = filtered.filter(d => d.name.toLowerCase().includes(search));

  // Sort
  if (sortMode === 'recent') filtered.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  else filtered.sort((a, b) => a.name.localeCompare(b.name));

  // Render
  let html = `<div class="design-card new-card" onclick="window.location='/'">
    <div class="plus">+</div><div class="label">New design</div>
  </div>`;

  html += filtered.map(d => {
    const thumb = d.thumbnailKey
      ? `<img src="/api/thumbnails/${d.id}" alt="" onerror="this.parentElement.innerHTML='No preview'">`
      : 'No preview';
    const badge = d.public ? '<div class="card-badge">Shared</div>' : '';
    return `<div class="design-card" data-id="${d.id}">
      ${badge}
      <div class="card-thumb" onclick="openDesign('${d.id}')">${thumb}</div>
      <div class="card-body">
        <div class="card-name" onclick="openDesign('${d.id}')">${esc(d.name)}</div>
        <div class="card-meta">
          <span>${d.length || '?'}"</span>
          <span>${d.tailType || ''}</span>
          <span>${timeAgo(d.updatedAt)}</span>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="openDesign('${d.id}')">Open</button>
          <button class="card-btn" onclick="toggleShare('${d.id}',this)">${d.public ? 'Unshare' : 'Share'}</button>
          <button class="card-btn" onclick="duplicateDesign('${d.id}')">Copy</button>
          <button class="card-btn danger" onclick="showDeleteDialog('${d.id}','${esc(d.name)}')">Del</button>
        </div>
      </div>
    </div>`;
  }).join('');

  grid.innerHTML = html;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30) return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Filters & sort ──
function setFilter(btn) {
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeFilter = btn.dataset.filter;
  renderDesigns();
}

function applyFilters() { renderDesigns(); }

function toggleSort() {
  sortMode = sortMode === 'recent' ? 'name' : 'recent';
  document.getElementById('sortBtn').textContent = sortMode === 'recent' ? 'Recent' : 'A-Z';
  renderDesigns();
}

// ── Actions ──
function openDesign(id) { window.location = `/?design=${id}`; }

async function toggleShare(id, btn) {
  const res = await fetch(`/api/designs/${id}/share`, { method: 'POST', credentials: 'include' });
  if (!res.ok) return;
  const data = await res.json();
  // Update local data
  const d = allDesigns.find(d => d.id === id);
  if (d) d.public = data.public;
  renderDesigns();
  if (data.public && data.shareUrl) {
    showToast(`Shared! <a onclick="copyLink('${data.shareUrl}')">Copy link</a>`);
    try { await navigator.clipboard.writeText(data.shareUrl); } catch {}
  } else {
    showToast('Design is now private');
  }
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
}

async function duplicateDesign(id) {
  const res = await fetch(`/api/designs/${id}`, { credentials: 'include' });
  if (!res.ok) return;
  const design = await res.json();
  const body = {
    name: design.name + ' (copy)',
    species: design.species,
    tailType: design.tailType,
    length: design.length,
    stateJSON: design.stateJSON,
  };
  const createRes = await fetch('/api/designs', {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (createRes.ok) {
    const newDesign = await createRes.json();
    window.location = `/?design=${newDesign.id}`;
  }
}

function showDeleteDialog(id, name) {
  pendingDeleteId = id;
  document.getElementById('deleteMsg').textContent = `Delete "${name}"? This cannot be undone.`;
  document.getElementById('deleteOverlay').classList.add('active');
}
function closeDeleteDialog() {
  pendingDeleteId = null;
  document.getElementById('deleteOverlay').classList.remove('active');
}
async function confirmDelete() {
  if (!pendingDeleteId) return;
  const id = pendingDeleteId;
  closeDeleteDialog();
  const res = await fetch(`/api/designs/${id}`, { method: 'DELETE', credentials: 'include' });
  if (res.ok) {
    allDesigns = allDesigns.filter(d => d.id !== id);
    renderDesigns();
    showToast('Design deleted');
  }
}

// ── Toast ──
let toastTimer = null;
function showToast(html) {
  const el = document.getElementById('toast');
  el.innerHTML = html;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Init ──
async function init() {
  const user = await checkAuth();
  if (!user) return;
  renderProfile(user);

  const res = await fetch('/api/designs', { credentials: 'include' });
  if (res.ok) {
    const data = await res.json();
    allDesigns = data.designs || [];
  }
  renderDesigns();
}

init();
</script>
</body>
</html>
