<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Swimbait Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0d;--sf:#181816;--sf2:#222220;--bd:#2e2e2a;--tx:#e8e4d9;--mu:#8a8778;--ac:#c4a04a;--ac2:#5a9a6b;--err:#c45a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh}

/* ── Nav ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--bd);background:var(--sf)}
.nav-brand{font-family:'Instrument Serif',serif;font-size:18px;text-decoration:none;color:var(--tx)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:10px;color:var(--mu)}
.nav-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;font-size:9px;padding:6px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-radius:2px;text-decoration:none;transition:all .15s}
.nav-btn:hover{border-color:var(--ac);color:var(--tx)}
.nav-btn.primary{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.nav-btn.primary:hover{opacity:.85}

/* ── Profile header ── */
.profile-header{padding:32px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:20px;max-width:1200px;margin:0 auto}
.avatar{width:64px;height:64px;border-radius:50%;background:var(--sf2);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--ac);font-family:'Instrument Serif',serif}
.profile-info h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:22px}
.profile-meta{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.profile-stats{display:flex;gap:16px;margin-top:6px}
.stat{font-size:10px;color:var(--mu)}
.stat strong{color:var(--tx)}

/* ── Design grid ── */
.section{max-width:1200px;margin:0 auto;padding:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ac)}
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:16px}

.design-card{background:var(--sf);border:1px solid var(--bd);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.design-card:hover{border-color:var(--ac)}
.card-thumb{width:100%;aspect-ratio:16/10;background:var(--sf2);display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:9px;text-transform:uppercase;letter-spacing:1px;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-body{padding:12px}
.card-name{font-size:11px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:8px;color:var(--mu);display:flex;gap:8px}
.card-actions{display:flex;gap:4px;margin-top:8px}
.card-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:'DM Mono',monospace;font-size:8px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-radius:2px;transition:all .12s}
.card-btn:hover{border-color:var(--ac);color:var(--tx)}
.card-btn.danger:hover{border-color:var(--err);color:var(--err)}

.empty-state{text-align:center;padding:60px 20px;color:var(--mu)}
.empty-state p{font-size:11px;margin-bottom:16px}

.loading{text-align:center;padding:40px;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px}

/* ── Confirm dialog ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.overlay.active{display:flex}
.dialog{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:24px;max-width:360px;width:90%;text-align:center}
.dialog p{font-size:11px;margin-bottom:16px}
.dialog-btns{display:flex;gap:8px;justify-content:center}
.dialog-btn{padding:8px 16px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-radius:2px}
.dialog-btn:hover{border-color:var(--ac);color:var(--tx)}
.dialog-btn.danger{background:var(--err);color:var(--bg);border-color:var(--err)}
.dialog-btn.danger:hover{opacity:.85}

@media(max-width:480px){
  .profile-header{flex-direction:column;text-align:center;padding:20px 16px}
  .grid{grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:10px}
  .section{padding:16px}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">Swimbait Designer</a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <a href="/" class="nav-btn primary">New design</a>
    <button class="nav-btn" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="profile-header" id="profileHeader" style="display:none">
  <div class="avatar" id="avatar"></div>
  <div>
    <h2 id="displayName"></h2>
    <div class="profile-meta"><span id="username"></span> &middot; <span id="plan"></span> &middot; joined <span id="joined"></span></div>
    <div class="profile-stats">
      <div class="stat"><strong id="designCount">0</strong> designs</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">Your designs</div>
  </div>
  <div class="loading" id="loadingState">Loading designs...</div>
  <div class="grid" id="designGrid" style="display:none"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <p>No designs yet. Start creating!</p>
    <a href="/" class="nav-btn primary">Open designer</a>
  </div>
</div>

<div class="overlay" id="deleteOverlay">
  <div class="dialog">
    <p>Delete this design? This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="dialog-btn" onclick="closeDeleteDialog()">Cancel</button>
      <button class="dialog-btn danger" id="confirmDeleteBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let pendingDeleteId = null;

// ── Auth check ──
async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location = '/login'; return null; }
    return await res.json();
  } catch { window.location = '/login'; return null; }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location = '/login';
}

// ── Render profile ──
function renderProfile(user) {
  currentUser = user;
  document.getElementById('navUser').textContent = user.username;
  document.getElementById('avatar').textContent = user.displayName.charAt(0).toUpperCase();
  document.getElementById('displayName').textContent = user.displayName;
  document.getElementById('username').textContent = '@' + user.username;
  document.getElementById('plan').textContent = user.plan;
  document.getElementById('joined').textContent = new Date(user.createdAt).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  document.getElementById('designCount').textContent = user.designCount || 0;
  document.getElementById('profileHeader').style.display = 'flex';
}

// ── Render designs ──
function renderDesigns(designs) {
  const grid = document.getElementById('designGrid');
  const loading = document.getElementById('loadingState');
  const empty = document.getElementById('emptyState');

  loading.style.display = 'none';

  if (!designs.length) {
    empty.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  grid.innerHTML = designs.map(d => `
    <div class="design-card" onclick="openDesign('${d.id}')">
      <div class="card-thumb">
        ${d.thumbnailKey
          ? `<img src="/api/thumbnails/${d.id}" alt="${d.name}" onerror="this.parentElement.textContent='No preview'">`
          : 'No preview'}
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(d.name)}</div>
        <div class="card-meta">
          <span>${d.length}"</span>
          <span>${d.tailType}</span>
          <span>${timeAgo(d.updatedAt)}</span>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="card-btn" onclick="openDesign('${d.id}')">Open</button>
          <button class="card-btn" onclick="toggleShare('${d.id}', this)">${d.public ? 'Unshare' : 'Share'}</button>
          <button class="card-btn danger" onclick="showDeleteDialog('${d.id}')">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function openDesign(id) {
  window.location = `/?design=${id}`;
}

async function toggleShare(id, btn) {
  const res = await fetch(`/api/designs/${id}/share`, {
    method: 'POST', credentials: 'include',
  });
  if (res.ok) {
    const data = await res.json();
    btn.textContent = data.public ? 'Unshare' : 'Share';
    if (data.shareUrl) {
      navigator.clipboard.writeText(data.shareUrl).catch(() => {});
    }
  }
}

function showDeleteDialog(id) {
  pendingDeleteId = id;
  document.getElementById('deleteOverlay').classList.add('active');
}

function closeDeleteDialog() {
  pendingDeleteId = null;
  document.getElementById('deleteOverlay').classList.remove('active');
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const res = await fetch(`/api/designs/${pendingDeleteId}`, {
    method: 'DELETE', credentials: 'include',
  });
  closeDeleteDialog();
  if (res.ok) init(); // reload
}

// ── Init ──
async function init() {
  const user = await checkAuth();
  if (!user) return;
  renderProfile(user);

  const res = await fetch('/api/designs', { credentials: 'include' });
  if (res.ok) {
    const data = await res.json();
    renderDesigns(data.designs);
  }
}

init();
</script>
</body>
</html>
