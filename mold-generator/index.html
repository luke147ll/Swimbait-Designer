<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SBD Mold Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'JetBrains Mono', 'Courier New', monospace; color: #d4d4d4; background: #141414; font-size: 13px; -webkit-font-smoothing: antialiased; }
      input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: #222226; border-radius: 2px; outline: none; margin: 6px 0; cursor: pointer; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #c8a84e; cursor: pointer; border: 2px solid #1a1a1e; }
      input[type=range]::-webkit-slider-thumb:hover { background: #e0c060; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #333338; border-radius: 2px; }
      ::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
