<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — Swimbait Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0d;--sf:#181816;--sf2:#222220;--bd:#2e2e2a;--tx:#e8e4d9;--mu:#8a8778;--ac:#c4a04a;--ac2:#5a9a6b;--err:#c45a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.brand{text-align:center;margin-bottom:20px;text-decoration:none;display:block}
.brand h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:28px;color:var(--tx)}
.brand .sub{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;margin-top:3px}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:6px;width:100%;max-width:420px;overflow:hidden;text-align:center}
.card-body{padding:32px 28px}

.card-icon{font-size:36px;margin-bottom:12px}
.card-title{font-family:'Instrument Serif',serif;font-weight:400;font-size:22px;margin-bottom:6px}
.card-sub{font-size:10px;color:var(--mu);margin-bottom:24px;line-height:1.6}
.card-sub strong{color:var(--tx)}

.code-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.code-inputs input{width:44px;height:52px;text-align:center;font-size:22px;font-family:'DM Mono',monospace;font-weight:500;
  background:var(--sf2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);outline:none;transition:border-color .15s}
.code-inputs input:focus{border-color:var(--ac)}
.code-inputs input.err{border-color:var(--err)}

.submit-btn{width:100%;padding:12px;background:var(--ac);color:var(--bg);border:none;font-family:'DM Mono',monospace;
  font-size:11px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:2px;border-radius:3px;transition:opacity .15s}
.submit-btn:hover:not(:disabled){opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:default}

.error-msg{font-size:10px;color:var(--err);margin-top:12px;min-height:16px}
.success-msg{font-size:10px;color:var(--ac2);margin-top:12px;min-height:16px}

.resend-row{margin-top:20px;font-size:9px;color:var(--mu)}
.resend-row a{color:var(--ac);text-decoration:none;cursor:pointer}
.resend-row a:hover{text-decoration:underline}
.resend-row a.disabled{color:var(--mu);opacity:.4;pointer-events:none}
.cooldown{font-size:9px;color:var(--mu);margin-top:4px}

.footer-link{text-align:center;padding:16px 28px;border-top:1px solid var(--bd);font-size:9px;color:var(--mu)}
.footer-link a{color:var(--ac);text-decoration:none}
.footer-link a:hover{text-decoration:underline}
</style>
</head>
<body>

<a href="/" class="brand">
  <h1>Swimbait Designer</h1>
  <div class="sub">Spline-based profile engine</div>
</a>

<div class="card">
  <div class="card-body">
    <div class="card-icon">&#9993;</div>
    <div class="card-title">Check your email</div>
    <div class="card-sub">We sent a 6-digit code to <strong id="emailDisplay">your email</strong></div>

    <div class="code-inputs" id="codeInputs">
      <input type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <button class="submit-btn" id="verifyBtn" onclick="verify()">Verify</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="resend-row">
      Didn't get the code? <a id="resendLink" onclick="resend()">Resend</a>
    </div>
    <div class="cooldown" id="cooldownText"></div>
  </div>

  <div class="footer-link"><a href="/">Back to designer</a></div>
</div>

<script>
const inputs = document.querySelectorAll('#codeInputs input');

// ── Auto-advance / backspace navigation ──
inputs.forEach((input, i) => {
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, ''); // digits only
    if (input.value && i < 5) inputs[i + 1].focus();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !input.value && i > 0) {
      inputs[i - 1].focus();
      inputs[i - 1].value = '';
    }
    if (e.key === 'Enter') verify();
  });
});

// ── Handle paste of full code ──
inputs[0].addEventListener('paste', e => {
  const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
  if (/^\d{6}$/.test(paste)) {
    paste.split('').forEach((d, i) => { inputs[i].value = d; });
    inputs[5].focus();
    e.preventDefault();
  }
});

function getCode() {
  return Array.from(inputs).map(i => i.value).join('');
}

function clearInputs() {
  inputs.forEach(i => { i.value = ''; i.classList.remove('err'); });
  inputs[0].focus();
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('successMsg').textContent = '';
  inputs.forEach(i => i.classList.add('err'));
}

function showSuccess(msg) {
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('errorMsg').textContent = '';
  inputs.forEach(i => i.classList.remove('err'));
}

// ── Init: check auth + verification status ──
async function init() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location = '/login'; return; }
    const user = await res.json();
    if (user.emailVerified) {
      try { if (localStorage.getItem('sd_pending_design')) { window.location = '/'; return; } } catch {}
      window.location = '/profile'; return;
    }
    document.getElementById('emailDisplay').textContent = user.email || 'your email';
    inputs[0].focus();
  } catch {
    window.location = '/login';
  }
}

// ── Verify code ──
async function verify() {
  const code = getCode();
  if (code.length !== 6) { showError('Enter all 6 digits'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.textContent = 'Verifying...';
  document.getElementById('errorMsg').textContent = '';

  try {
    const res = await fetch('/api/auth/verify', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Verified! Redirecting...');
      const dest = (() => { try { if (localStorage.getItem('sd_pending_design')) return '/'; } catch {} return '/profile'; })();
      setTimeout(() => { window.location = dest; }, 800);
      return;
    }
    showError(data.error || 'Verification failed');
    if (data.attemptsRemaining != null) {
      showError(`${data.error} (${data.attemptsRemaining} attempts left)`);
    }
  } catch {
    showError('Network error \u2014 try again');
  }
  btn.disabled = false;
  btn.textContent = 'Verify';
}

// ── Resend code with cooldown ──
let cooldownInterval = null;

async function resend() {
  const link = document.getElementById('resendLink');
  if (link.classList.contains('disabled')) return;

  try {
    const res = await fetch('/api/auth/resend-code', {
      method: 'POST',
      credentials: 'include',
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('New code sent \u2014 check your email.');
      clearInputs();
      startCooldown(60);
    } else {
      if (data.retryAfter) {
        showError(data.error);
        startCooldown(data.retryAfter);
      } else {
        showError(data.error || 'Could not resend');
      }
    }
  } catch {
    showError('Network error');
  }
}

function startCooldown(seconds) {
  const link = document.getElementById('resendLink');
  const text = document.getElementById('cooldownText');
  link.classList.add('disabled');
  let remaining = seconds;
  text.textContent = `Resend available in ${remaining}s`;
  clearInterval(cooldownInterval);
  cooldownInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(cooldownInterval);
      link.classList.remove('disabled');
      text.textContent = '';
    } else {
      text.textContent = `Resend available in ${remaining}s`;
    }
  }, 1000);
}

init();
</script>
</body>
</html>
